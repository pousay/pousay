name: Metrics
on:
  schedule: [{cron: "0 1,13 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: pousay
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tehran
